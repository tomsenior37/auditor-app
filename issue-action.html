<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue — Field Ledger, Planner Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --paper: #f4efe3;
    --paper-deep: #ebe4d3;
    --ink: #1d1a14;
    --ink-dim: #6b6453;
    --ink-faint: #a59a82;
    --rule: #d8cfba;
    --rule-strong: #b8ad93;
    --accent: #a33c24;
    --accent-dim: #7a2c1a;
    --accent-tint: rgba(163,60,36,0.08);
    --pass: #556a3f;
    --fail: #a33c24;
    --amber: #a67425;
    --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
    --serif: 'Plus Jakarta Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }
  body {
    font-family: var(--sans);
    background: var(--paper);
    margin: 0; padding: 32px 20px 40px;
    color: var(--ink);
    font-size: 15.5px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.18 0 0 0 0 0.15 0 0 0 0 0.08 0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply; opacity: 0.55;
  }
  ::selection { background: var(--accent); color: var(--paper); }

  .card {
    max-width: 680px; margin: 0 auto;
    background: transparent;
    border: none; border-radius: 0;
    padding: 0; box-shadow: none;
    position: relative; z-index: 1;
  }
  .card::before {
    content: 'ISSUE DOSSIER'; display: block;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.3em; color: var(--ink-dim); margin-bottom: 10px;
  }
  h1 {
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 800; font-size: 34px;
    letter-spacing: -0.035em; line-height: 1.05;
    margin: 0 0 10px;
  }
  h1::after {
    content: ''; display: block; width: 48px; height: 2px;
    background: var(--accent); margin-top: 18px;
  }
  .sub {
    font-family: var(--sans); font-size: 15px;
    color: var(--ink-dim); margin-bottom: 26px; line-height: 1.5;
  }
  .row {
    display: flex; padding: 11px 0;
    border-bottom: 1px solid var(--rule);
    gap: 14px; align-items: baseline;
  }
  .row:first-child { border-top: 1px solid var(--rule); }
  .row .k {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-dim); min-width: 130px; flex-shrink: 0;
  }
  .row .v {
    font-weight: 500; font-size: 14.5px;
    color: var(--ink); flex: 1;
  }
  .pill {
    display: inline-block; padding: 3px 9px;
    border-radius: 2px; color: var(--paper);
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .sect {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; color: var(--ink);
    letter-spacing: 0.22em;
    margin: 32px 0 14px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex; align-items: center; gap: 10px;
  }
  .sect::before {
    content: ''; display: block; width: 18px; height: 2px;
    background: var(--accent); border-radius: 1px; flex-shrink: 0;
  }
  label {
    display: block; margin-top: 18px;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  input, textarea {
    width: 100%; padding: 12px 2px;
    border: none; border-bottom: 1px solid var(--rule-strong);
    border-radius: 0;
    font-family: var(--sans); font-size: 16px;
    margin-top: 8px; background: transparent;
    color: var(--ink); outline: none;
    transition: border-color .2s;
  }
  input:focus, textarea:focus { border-bottom-color: var(--accent); }
  textarea {
    min-height: 90px; resize: vertical;
    border: 1px solid var(--rule-strong); border-radius: 4px;
    padding: 12px 14px; line-height: 1.55;
    background: rgba(255,255,255,0.4);
  }
  button {
    width: 100%; background: var(--ink); color: var(--paper);
    border: none; border-radius: 4px;
    padding: 16px;
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; margin-top: 26px;
    transition: background .2s, transform .15s;
  }
  button:hover { background: var(--accent); }
  button:active { transform: scale(0.98); }
  .success {
    background: rgba(85,106,63,0.08);
    border: 1px solid var(--pass);
    color: var(--pass);
    padding: 14px 16px; border-radius: 4px;
    margin-top: 20px;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; line-height: 1.5;
    display: none;
  }
  .error {
    background: rgba(163,60,36,0.08);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 14px 16px; border-radius: 4px;
    margin-top: 20px;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; line-height: 1.5;
    display: none;
  }
  a.pdf-link {
    display: inline-flex; align-items: center; gap: 8px;
    margin: 18px 0 4px; color: var(--accent);
    text-decoration: none;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
  }
  a.pdf-link:hover { color: var(--accent-dim); border-bottom-color: var(--accent-dim); }
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Loading…</h1>
  <div class="sub" id="sub"></div>
  <div id="issue-details"></div>
  <a id="pdf-link" class="pdf-link" href="" target="_blank" style="display:none;">📄 View original inspection PDF</a>

  <div class="sect">Your response</div>
  <form id="form">
    <label>Work Request (WR) Number
      <input type="text" id="wr" placeholder="e.g. WR-123456">
    </label>
    <label>Work Order (WO) Number
      <input type="text" id="wo" placeholder="e.g. WO-987654">
    </label>
    <label>WO Execution Date
      <input type="date" id="wo-date">
    </label>
    <label>Your name
      <input type="text" id="planner-name" placeholder="Planner name (optional)">
    </label>
    <label>Notes / comments (optional)
      <textarea id="note" placeholder="Scheduling notes, parts ordered, etc."></textarea>
    </label>
    <button type="submit">Submit to Auditor</button>
    <div class="success" id="success">✅ Thanks — the issue has been updated.</div>
    <div class="error" id="error"></div>
  </form>
</div>
<script>
(async function () {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { document.getElementById('title').textContent = 'Missing issue id'; return; }
  const title = document.getElementById('title');
  const sub = document.getElementById('sub');
  const details = document.getElementById('issue-details');

  try {
    const r = await fetch('/api/rectifications/' + encodeURIComponent(id) + '/public');
    if (!r.ok) throw new Error('Issue not found');
    const d = await r.json();
    title.textContent = d.title || 'Issue ' + d.id;
    sub.textContent = d.id + ' · ' + (d.location || '') + (d.machine ? ' / ' + d.machine : '') + (d.component ? ' / ' + d.component : '');
    const priColor = { critical: '#a13544', high: '#da7101', medium: '#d19900', low: '#437a22' }[d.priority] || '#666';
    const esc = s => (s || '').toString().replace(/</g, '&lt;').replace(/>/g, '&gt;');
    details.innerHTML =
      '<div class="row"><div class="k">Priority</div><div class="v"><span class="pill" style="background:' + priColor + ';">' + esc(d.priority) + '</span></div></div>' +
      (d.dueDate ? '<div class="row"><div class="k">Due date</div><div class="v">' + esc(d.dueDate) + '</div></div>' : '') +
      (d.templateName ? '<div class="row"><div class="k">Template</div><div class="v">' + esc(d.templateName) + '</div></div>' : '') +
      (d.description ? '<div class="row"><div class="k">Description</div><div class="v" style="white-space:pre-wrap;">' + esc(d.description) + '</div></div>' : '') +
      (d.workRequestNumber ? '<div class="row"><div class="k">Current WR</div><div class="v">' + esc(d.workRequestNumber) + '</div></div>' : '') +
      (d.workOrderNumber ? '<div class="row"><div class="k">Current WO</div><div class="v">' + esc(d.workOrderNumber) + '</div></div>' : '') +
      (d.workOrderExecutionDate ? '<div class="row"><div class="k">WO exec date</div><div class="v">' + esc(d.workOrderExecutionDate) + '</div></div>' : '');
    document.getElementById('wr').value = d.workRequestNumber || '';
    document.getElementById('wo').value = d.workOrderNumber || '';
    document.getElementById('wo-date').value = d.workOrderExecutionDate || '';
    if (d.assignedTo && d.assignedTo.name) document.getElementById('planner-name').value = d.assignedTo.name;
    if (d.inspectionId) {
      const pdf = document.getElementById('pdf-link');
      pdf.href = '/api/report/' + d.inspectionId;
      pdf.style.display = 'inline-block';
    }
  } catch (e) {
    title.textContent = 'Issue not found';
    sub.textContent = e.message;
    return;
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      workRequestNumber: document.getElementById('wr').value.trim(),
      workOrderNumber: document.getElementById('wo').value.trim(),
      workOrderExecutionDate: document.getElementById('wo-date').value || null,
      plannerNote: document.getElementById('note').value.trim(),
      plannerName: document.getElementById('planner-name').value.trim()
    };
    if (!payload.workRequestNumber && !payload.workOrderNumber && !payload.workOrderExecutionDate && !payload.plannerNote) {
      const err = document.getElementById('error'); err.textContent = 'Enter at least one field'; err.style.display = 'block'; return;
    }
    try {
      const r = await fetch('/api/rectifications/' + encodeURIComponent(id) + '/workorder', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      if (!r.ok) throw new Error('Submit failed');
      document.getElementById('success').style.display = 'block';
      document.getElementById('error').style.display = 'none';
    } catch (err) {
      const e2 = document.getElementById('error'); e2.textContent = err.message; e2.style.display = 'block';
    }
  });
})();
</script>
</body>
</html>
