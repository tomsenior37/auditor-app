<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise Work Request — Field Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e0c; --surface:#17140f; --rule:#2b261d; --rule-strong:#3a3327;
  --accent:#c8553d; --accent-dim:#8a3626; --text:#eae3d2; --text-dim:#8a7f6b; --text-faint:#5a5142;
  --pass:#7a9969; --fail:#c8553d;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --serif:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
body{
  background:var(--bg); color:var(--text);
  font-family:var(--sans); font-size:15.5px; line-height:1.5;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; -webkit-font-smoothing:antialiased;
  position:relative;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9998;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.89 0 0 0 0 0.82 0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  mix-blend-mode:overlay; opacity:0.5;
}
::selection{background:var(--accent);color:var(--bg);}

.card{
  background:var(--surface); border:1px solid var(--rule);
  border-radius:6px; padding:32px 26px 28px;
  max-width:480px; width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
  position:relative; z-index:1;
}
.card::before{
  content:'WORK REQUEST'; display:block;
  font-family:var(--mono); font-size:9.5px; font-weight:500;
  letter-spacing:0.3em; color:var(--text-dim); margin-bottom:8px;
}
h1{
  font-family:var(--sans);
  font-weight:700; font-size:26px; letter-spacing:-0.03em;
  line-height:1.05; margin-bottom:8px; color:var(--text);
}
h1::after{
  content:''; display:block; width:38px; height:2px;
  background:var(--accent); margin-top:14px;
}
.sub{
  font-family:var(--sans); font-size:14px;
  color:var(--text-dim); margin-bottom:24px; line-height:1.5;
}
.info-row{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:11px 0; border-bottom:1px solid var(--rule);
  font-size:14px; gap:12px;
}
.info-row:first-child{border-top:1px solid var(--rule);}
.info-label{
  font-family:var(--mono); font-size:10px; font-weight:500;
  letter-spacing:0.16em; text-transform:uppercase;
  color:var(--text-dim); flex-shrink:0;
}
.info-value{
  font-weight:500; text-align:right;
  color:var(--text); word-break:break-word;
}
.badge-fail{
  display:inline-block; background:transparent;
  color:var(--fail); border:1px solid var(--fail);
  padding:3px 9px; border-radius:2px;
  font-family:var(--mono); font-size:9px; font-weight:600;
  letter-spacing:0.2em; text-transform:uppercase;
}
.fg{margin-top:22px;}
label{
  display:block; font-family:var(--mono);
  font-size:10px; font-weight:500;
  letter-spacing:0.18em; text-transform:uppercase;
  margin-bottom:10px; color:var(--text-dim);
}
input[type=text]{
  width:100%; background:transparent;
  border:none; border-bottom:1px solid var(--rule-strong);
  color:var(--text); padding:12px 2px;
  font-family:var(--sans);
  font-weight:600; font-size:20px; letter-spacing:-0.02em;
  border-radius:0; outline:none;
  transition:border-color .2s;
}
input[type=text]:focus{border-bottom-color:var(--accent);}
.btn{
  width:100%; background:var(--accent); color:var(--bg);
  border:none; padding:16px; border-radius:4px;
  font-family:var(--sans); font-size:12px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase;
  cursor:pointer; margin-top:22px;
  transition:background .2s, transform .15s;
}
.btn:active{background:var(--accent-dim); transform:scale(0.98);}
.btn:disabled{opacity:0.5; cursor:not-allowed;}
.msg{
  text-align:center; padding:14px 16px;
  border-radius:4px; margin-top:18px;
  font-family:var(--mono); font-size:11px; font-weight:500;
  letter-spacing:0.1em; line-height:1.5;
  display:none;
}
.msg.success{
  background:rgba(122,153,105,0.08); color:var(--pass);
  border:1px solid var(--pass); display:block;
}
.msg.error{
  background:rgba(200,85,61,0.08); color:var(--fail);
  border:1px solid var(--fail); display:block;
}
.spinner{
  display:inline-block; width:14px; height:14px;
  border:1.5px solid rgba(15,14,12,0.25);
  border-top-color:var(--bg);
  border-radius:50%; animation:spin .8s linear infinite;
  vertical-align:middle; margin-right:10px;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div id="loading-state">
    <div class="sub"><span class="spinner"></span> Loading inspection…</div>
  </div>
  <div id="main-state" style="display:none;">
    <h1>🔧 Input Work Request Number</h1>
    <p class="sub">Enter the work request number for this failed inspection.</p>

    <div id="insp-details"></div>

    <div class="fg">
      <label>Work Request Number *</label>
      <input type="text" id="wr-number" placeholder="e.g. WR-2026-04512" autocomplete="off">
    </div>

    <button class="btn" id="submit-btn" onclick="submitWR()">Submit Work Request Number</button>
    <div class="msg" id="msg"></div>
  </div>
  <div id="notfound-state" style="display:none;">
    <h1>⚠️ Not Found</h1>
    <p class="sub">This inspection record could not be found.</p><p id="notfound-detail"></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

async function init() {
  if (!id) { show('notfound', 'No ID in URL'); return; }
  try {
    const base = window.location.origin;
    const url = base + '/api/inspection/' + id;
    let r;
    try { r = await fetch(url); } catch(e) { show('notfound', 'Fetch error: ' + e.message + '<br>URL: ' + url); return; }
    if (!r.ok) { show('notfound', 'Server returned HTTP ' + r.status + '<br>URL: ' + url + '<br>ID: ' + id); return; }
    const rec = await r.json();
    document.getElementById('insp-details').innerHTML = `
      <div class="info-row"><span class="info-label">Template</span><span class="info-value">${esc(rec.templateName||'N/A')}</span></div>
      <div class="info-row"><span class="info-label">Location</span><span class="info-value">${esc(rec.location)}</span></div>
      <div class="info-row"><span class="info-label">Equipment</span><span class="info-value">${esc(rec.machine)}</span></div>
      ${rec.guardId ? `<div class="info-row"><span class="info-label">Component</span><span class="info-value">${esc(rec.guardId)}</span></div>` : ''}
      <div class="info-row"><span class="info-label">Inspector</span><span class="info-value">${esc(rec.inspector)}</span></div>
      <div class="info-row"><span class="info-label">Date</span><span class="info-value">${new Date(rec.timestamp).toLocaleDateString('en-AU')}</span></div>
      <div class="info-row"><span class="info-label">Result</span><span class="info-value"><span class="badge-fail">FAIL</span></span></div>
      ${rec.workRequestNumber ? `<div class="info-row"><span class="info-label">Existing WR#</span><span class="info-value" style="color:#e05c3a;">${esc(rec.workRequestNumber)}</span></div>` : ''}
    `;
    if (rec.workRequestNumber) {
      document.getElementById('wr-number').value = rec.workRequestNumber;
    }
    show('main');
  } catch(e) {
    show('notfound');
  }
}

function show(state, msg) {
  document.getElementById('loading-state').style.display = state==='loading'?'block':'none';
  document.getElementById('main-state').style.display = state==='main'?'block':'none';
  document.getElementById('notfound-state').style.display = state==='notfound'?'block':'none';
  if (msg && state==='notfound') { const el = document.getElementById('notfound-detail'); if(el) el.innerHTML = '<br><small style="color:#888;word-break:break-all;">' + msg + '</small>'; }
}

async function submitWR() {
  const wr = document.getElementById('wr-number').value.trim();
  if (!wr) { showMsg('Work request number is required', false); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';
  try {
    const r = await fetch(window.location.origin + '/api/inspection/' + id + '/wr', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ workRequestNumber: wr })
    });
    const d = await r.json();
    if (d.success) {
      showMsg('✅ Work request number ' + wr + ' has been recorded. The inspection is now marked WR Raised.', true);
      btn.style.display = 'none';
    } else {
      showMsg('Error: ' + (d.error||'Unknown'), false);
      btn.disabled = false;
      btn.textContent = 'Raise Work Request';
    }
  } catch(e) {
    showMsg('Network error — please try again', false);
    btn.disabled = false;
    btn.textContent = 'Raise Work Request';
  }
}

function showMsg(text, success) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (success?'success':'error');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
